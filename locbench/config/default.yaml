# LocBench default config (tracked)
# Override paths and secrets in locbench/config/local.yaml (ignored by git).

run:
  mode: bash
  workers: 1
  slice: ""
  filter: ""
  shuffle: false
  shuffle_seed: 42
  skip_missing: false
  redo_existing: false
  output_dir: ""
  image: locbench-minisweagent:latest
  method: ""
  agent_config: ""
  tool_config: ""
  keep_worktrees: false
  topk_blocks: 50
  topk_files: 10
  topk_modules: 10
  topk_entities: 50
  filters: ""
  mapper_type: ast
  graph_index_dir: ""
  force_rebuild: false

model:
  model_class: chatanywhere
  model_name: deepseek-v3.2

paths:
  dataset_root: ""
  repos_root: ""
  indexes_root: locbench/indexes
  model_root: locbench/models/CodeRankEmbed
  worktrees_root: locbench/worktrees
  output_root: locbench/results
  output_model_name: openai_deepseek-v3.2

pricing:
  models:
    deepseek-v3.2:
      prompt_per_1k: 0.0012
      completion_per_1k: 0.0018
      currency: USD

billing:
  mode: auto
  estimate:
    tokenizer: tiktoken
    encoding: cl100k_base
    message_overhead:
      per_message: 3
      per_name: 1

env: {}
