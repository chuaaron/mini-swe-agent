chunker: sliding
chunk_size: 800
overlap: 200
embedding_provider: local
embedding_model: "/home/chaihongzheng/workspace/locbench/mini-swe-agent/locbench/models/CodeRankEmbed"
embedding_batch_size: 64
embedding_max_length: 4096
# Code search/Radar 使用的 GPU：cuda | cuda:0 | cuda:1 | cpu；也可在 local.yaml paths.embedding_device 覆盖
embedding_device: cuda
trust_remote_code: true
index_root: "/home/chaihongzheng/workspace/locbench/mini-swe-agent/locbench/indexes/llamaindex_code_custom_40_15_800"
max_file_size: 524288
aggregation: hybrid
# 索引兼容性校验模式：
# - strict: 包含 repo_fingerprint(路径敏感)
# - static: 忽略路径指纹，仅按 repo_slug/base_commit/embedding/chunk 参数校验
index_validation_mode: static
# 索引构建策略：
# - auto: 缺失或不兼容时自动重建
# - read_only: 只允许复用已建索引，不兼容直接报错
index_build_policy: read_only

# Top-N 自动骨架（不泄露正文）：
# 在 file_radar_search 返回中自动附带前 N 个候选文件的 imports/symbols 摘要。
auto_skeleton_enabled: true
auto_skeleton_topn: 3
auto_skeleton_budget_chars: 4000
auto_skeleton_max_imports_per_file: 0
auto_skeleton_max_symbols_per_file: 14
auto_skeleton_include_signature: false
auto_skeleton_query_aware: true

# 单 query 自动扩展（只在未显式提供 --queries 时触发）：
# 会生成多个视角并做融合排序，帮助提升 GT 文件被检出的概率。
auto_query_expansion_enabled: true
auto_query_expansion_max_queries: 3
