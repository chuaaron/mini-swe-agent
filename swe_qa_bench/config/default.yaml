# SWE-QA-Bench default config (tracked)
# Override paths and secrets in swe_qa_bench/config/local.yaml (ignored by git).

run:
  mode: bash
  tools_prompt: neutral
  workers: 1
  shuffle: false
  shuffle_seed: 42
  slice: ""
  repos: ""
  redo_existing: false
  output_dir: ""
  image: locbench-minisweagent:latest
  method: ""
  agent_config: ""
  tool_config: ""

model:
  model_class: chatanywhere
  model_name: deepseek-v3.2

paths:
  dataset_root: ""
  repos_root: ""
  indexes_root: swe_qa_bench/indexes
  model_root: locbench/models/CodeRankEmbed
  output_root: swe_qa_bench/results
  output_model_name: openai_deepseek-v3.2

pricing:
  models:
    deepseek-v3.2:
      prompt_per_1k: 0.0012
      completion_per_1k: 0.0018
      currency: USD

billing:
  mode: auto
  estimate:
    tokenizer: tiktoken
    encoding: cl100k_base
    message_overhead:
      per_message: 3
      per_name: 1

env: {}
